<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>GAIA Web UI Prototype</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #000400;
        --panel: #031003;
        --panel-2: #061806;
        --line: #145018;
        --line-strong: #7cff84;
        --text: #d7ffcf;
        --muted: #6aa66a;
        --green: #3cff4e;
        --amber: #e8da62;
        --red: #ff5d4d;
        --cyan: #66ffd9;
        --violet: #d08cff;
        --shadow: rgba(0, 0, 0, 0.62);
        font-family:
          "Perfect DOS VGA 437", "Px437 IBM VGA8", "Fixedsys", "Terminal",
          "Monaco", "Courier New", monospace;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
      }

      body {
        margin: 0;
        font-size: 12px;
        background:
          radial-gradient(circle at 16% 18%, rgba(57, 255, 95, 0.1), transparent 24%),
          linear-gradient(90deg, rgba(57, 255, 95, 0.035) 1px, transparent 1px),
          linear-gradient(rgba(57, 255, 95, 0.05) 1px, transparent 1px),
          var(--bg);
        background-size: 100% 100%, 16px 16px, 16px 16px;
        color: var(--text);
        overflow: hidden;
        text-shadow: 0 0 4px rgba(57, 255, 95, 0.42);
        image-rendering: pixelated;
        -webkit-font-smoothing: none;
        font-smooth: never;
      }

      body::after {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        background:
          repeating-linear-gradient(
            to bottom,
            rgba(80, 255, 98, 0.075) 0,
            rgba(80, 255, 98, 0.075) 1px,
            transparent 1px,
            transparent 3px
          );
        mix-blend-mode: screen;
        opacity: 0.34;
        z-index: 20;
      }

      button,
      textarea,
      input,
      select {
        font: inherit;
      }

      button {
        min-height: 30px;
        border: 1px solid var(--line);
        border-radius: 0;
        background: #030803;
        color: var(--text);
        cursor: pointer;
        text-transform: uppercase;
        letter-spacing: 0;
        box-shadow:
          inset 1px 1px 0 rgba(124, 255, 132, 0.22),
          inset -1px -1px 0 rgba(0, 0, 0, 0.8);
      }

      button:hover,
      button:focus-visible {
        border-color: var(--green);
        outline: none;
        box-shadow:
          0 0 0 1px rgba(60, 255, 78, 0.26),
          0 0 14px rgba(60, 255, 78, 0.14),
          inset 1px 1px 0 rgba(124, 255, 132, 0.24),
          inset -1px -1px 0 rgba(0, 0, 0, 0.85);
      }

      button[aria-pressed="true"],
      .workspace-card.active,
      .room-link.active,
      .tab.active,
      .room-tab.active,
      .agent.active {
        border-color: var(--green);
        color: var(--green);
        background: #071b08;
        box-shadow:
          inset 0 0 0 1px rgba(57, 255, 95, 0.36),
          0 0 12px rgba(57, 255, 95, 0.12);
      }

      .app {
        height: 100%;
        display: grid;
        grid-template-rows: 36px 1fr 112px;
        grid-template-columns: 258px minmax(0, 1fr) 380px;
        grid-template-areas:
          "nav top top"
          "nav chat side"
          "nav composer side";
      }

      .nav {
        grid-area: nav;
        display: grid;
        grid-template-rows: auto 1fr auto;
        min-width: 0;
        min-height: 0;
        border-right: 1px solid var(--line);
        background:
          linear-gradient(180deg, rgba(57, 255, 95, 0.05), transparent 32%),
          rgba(3, 9, 3, 0.98);
      }

      .nav-head {
        padding: 12px;
        border-bottom: 1px solid var(--line);
      }

      .nav-title {
        color: var(--green);
        font-size: 18px;
        text-transform: uppercase;
        letter-spacing: 0;
      }

      .nav-subtitle {
        margin-top: 4px;
        color: var(--muted);
        font-size: 12px;
      }

      .nav-scroll {
        min-height: 0;
        overflow: auto;
        padding: 10px;
      }

      .nav-section {
        margin-bottom: 16px;
      }

      .nav-label {
        display: flex;
        justify-content: space-between;
        gap: 8px;
        margin-bottom: 8px;
        color: var(--muted);
        font-size: 12px;
        text-transform: uppercase;
      }

      .workspace-card,
      .room-link {
        width: 100%;
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 8px;
        align-items: center;
        margin-bottom: 7px;
        padding: 8px;
        text-align: left;
        text-transform: none;
      }

      .workspace-name,
      .room-name {
        display: block;
        color: var(--text);
      }

      .workspace-path,
      .room-meta {
        display: block;
        margin-top: 3px;
        color: var(--muted);
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .nav-foot {
        display: grid;
        gap: 8px;
        padding: 10px;
        border-top: 1px solid var(--line);
      }

      .topbar {
        grid-area: top;
        display: grid;
        grid-template-columns: 1fr auto auto;
        align-items: center;
        gap: 12px;
        padding: 0 12px;
        border-bottom: 1px solid var(--line);
        background: rgba(2, 8, 2, 0.96);
        box-shadow: 0 1px 0 rgba(57, 255, 95, 0.18);
      }

      .topbar,
      .nav,
      .side,
      .composer {
        box-shadow: inset 0 0 18px rgba(57, 255, 95, 0.035);
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 10px;
        min-width: 0;
      }

      .prompt {
        color: var(--green);
        text-transform: uppercase;
      }

      .room {
        color: var(--muted);
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .pill {
        display: inline-flex;
        align-items: center;
        min-height: 22px;
        padding: 0 8px;
        border: 1px solid var(--line);
        border-radius: 0;
        color: var(--muted);
        white-space: nowrap;
        background: rgba(3, 12, 3, 0.72);
      }

      .chat {
        grid-area: chat;
        min-width: 0;
        overflow: auto;
        padding: 16px 18px 28px;
        background:
          linear-gradient(90deg, rgba(57, 255, 95, 0.025), transparent 18%),
          rgba(2, 4, 2, 0.72);
      }

      .event {
        display: grid;
        grid-template-columns: 12px 116px minmax(0, 1fr);
        gap: 14px;
        padding: 11px 0;
        border-bottom: 1px solid rgba(57, 255, 95, 0.18);
      }

      .event::before {
        content: ">";
        color: var(--green);
        margin-left: -10px;
      }

      .meta {
        color: var(--muted);
        font-size: 12px;
        line-height: 1.45;
      }

      .author {
        color: var(--text);
      }

      .author.user {
        color: var(--cyan);
      }

      .author.agent-gaia {
        color: var(--green);
      }

      .author.agent-sidia {
        color: var(--violet);
      }

      .author.agent-terry {
        color: var(--amber);
      }

      .content {
        min-width: 0;
        line-height: 1.55;
        white-space: pre-wrap;
      }

      .tool-row {
        margin-top: 10px;
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        color: var(--muted);
        font-size: 12px;
      }

      .tool {
        border: 1px solid var(--line);
        border-radius: 0;
        padding: 3px 8px;
        background: #030803;
      }

      .running {
        color: var(--amber);
      }

      .side {
        grid-area: side;
        display: grid;
        grid-template-rows: minmax(0, 42%) minmax(0, 58%);
        min-width: 0;
        border-left: 1px solid var(--line);
        background: rgba(3, 9, 3, 0.98);
      }

      .side-block {
        display: grid;
        grid-template-rows: auto minmax(0, 1fr);
        min-height: 0;
        border-bottom: 1px solid var(--line);
        min-width: 0;
      }

      .side-block:last-child {
        border-bottom: 0;
      }

      .block-head {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 8px;
        align-items: center;
        min-height: 34px;
        padding: 0 10px;
        border-bottom: 1px solid var(--line);
        background: #040d04;
      }

      .block-title {
        color: var(--green);
        text-transform: uppercase;
      }

      .block-meta {
        color: var(--muted);
        font-size: 12px;
      }

      .room-panel,
      .workspace-panel {
        display: grid;
        min-height: 0;
      }

      .room-panel {
        grid-template-rows: auto auto minmax(0, 1fr);
      }

      .workspace-panel {
        grid-template-rows: auto minmax(0, 1fr);
      }

      .section {
        padding: 10px;
        min-width: 0;
      }

      .section-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        margin-bottom: 10px;
        color: var(--muted);
        font-size: 12px;
        text-transform: uppercase;
      }

      .room-tabs {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 6px;
        padding: 10px;
        border-bottom: 1px solid var(--line);
      }

      .room-tab {
        min-width: 0;
        padding: 0 6px;
      }

      .room-stats {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 6px;
        padding: 10px;
        border-bottom: 1px solid var(--line);
      }

      .stat {
        min-width: 0;
        border: 1px solid var(--line);
        padding: 7px;
        background: rgba(3, 12, 3, 0.72);
      }

      .stat-label {
        color: var(--muted);
        font-size: 11px;
        text-transform: uppercase;
      }

      .stat-value {
        margin-top: 4px;
        color: var(--green);
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .agents {
        display: grid;
        gap: 8px;
      }

      .agent {
        width: 100%;
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 8px;
        align-items: center;
        padding: 8px;
        text-align: left;
      }

      .agent-name {
        display: block;
        color: var(--text);
      }

      .agent-role {
        display: block;
        color: var(--muted);
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .agent-state {
        color: var(--muted);
        font-size: 12px;
        text-transform: uppercase;
      }

      .tabs {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 6px;
        padding: 10px;
        border-bottom: 1px solid var(--line);
      }

      .tab {
        min-width: 0;
        padding: 0 6px;
      }

      .editor {
        display: grid;
        grid-template-rows: auto minmax(0, 1fr) auto;
        min-height: 0;
        padding: 10px;
        gap: 10px;
      }

      .editor-title {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto auto;
        align-items: center;
        gap: 8px;
        color: var(--muted);
        font-size: 12px;
      }

      .file-path {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .raw-toggle {
        min-height: 24px;
        padding: 0 8px;
        font-size: 12px;
      }

      .rendered-editor {
        min-height: 0;
        overflow: auto;
        border: 1px solid var(--line);
        background: #010501;
        padding: 10px;
      }

      .setting-group {
        margin-bottom: 14px;
        border-bottom: 1px solid rgba(57, 255, 95, 0.18);
        padding-bottom: 12px;
      }

      .setting-group:last-child {
        margin-bottom: 0;
        border-bottom: 0;
      }

      .setting-heading {
        color: var(--green);
        text-transform: uppercase;
        margin-bottom: 8px;
        padding: 4px 6px;
        border-left: 4px solid var(--green);
        background: rgba(57, 255, 95, 0.08);
      }

      .setting-field {
        display: grid;
        grid-template-columns: 108px minmax(0, 1fr);
        gap: 8px;
        align-items: center;
        margin: 8px 0;
      }

      .setting-field label {
        color: var(--muted);
        text-transform: uppercase;
        font-size: 12px;
      }

      .setting-field input,
      .setting-field select,
      .md-line input,
      .md-line textarea,
      .md-list-row input {
        min-width: 0;
        border: 1px solid var(--line);
        background: #030803;
        color: var(--text);
        padding: 7px 8px;
        box-shadow: inset 0 0 0 1px rgba(57, 255, 95, 0.07);
      }

      .setting-list {
        display: grid;
        gap: 6px;
      }

      .md-line {
        display: grid;
        margin: 7px 0;
      }

      .md-line textarea {
        min-height: 54px;
      }

      .md-list-row {
        display: grid;
        grid-template-columns: 18px minmax(0, 1fr) 26px;
        gap: 8px;
        align-items: center;
      }

      .md-bullet {
        color: var(--green);
        text-align: center;
      }

      .md-list-row button {
        min-height: 26px;
        padding: 0;
      }

      .md-add-row {
        color: var(--muted);
        border-color: rgba(20, 80, 24, 0.9);
      }

      .rendered-editor p {
        margin: 6px 0;
        color: var(--text);
      }

      .rendered-json {
        display: grid;
        gap: 8px;
      }

      textarea {
        width: 100%;
        min-height: 0;
        resize: none;
        border: 1px solid var(--line);
        border-radius: 0;
        background: #010501;
        color: var(--text);
        padding: 10px;
        line-height: 1.5;
        caret-color: var(--green);
        box-shadow: inset 0 0 0 1px rgba(57, 255, 95, 0.08);
      }

      textarea.raw-hidden,
      .rendered-editor.raw-hidden {
        display: none;
      }

      textarea:focus {
        border-color: var(--green);
        outline: none;
      }

      .editor-actions {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }

      .composer {
        grid-area: composer;
        position: relative;
        display: grid;
        grid-template-rows: 1fr auto;
        gap: 8px;
        padding: 12px 18px;
        border-top: 1px solid var(--line);
        background: rgba(2, 8, 2, 0.98);
      }

      .composer-row {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 88px;
        gap: 10px;
      }

      .input-wrap {
        position: relative;
      }

      .input {
        height: 58px;
      }

      .status {
        display: flex;
        align-items: center;
        justify-content: space-between;
        min-width: 0;
        color: var(--muted);
        font-size: 12px;
      }

      .suggestions {
        position: absolute;
        left: 18px;
        right: 106px;
        bottom: 102px;
        max-height: 188px;
        overflow: auto;
        border: 1px solid var(--line-strong);
        border-radius: 0;
        background: #020802;
        box-shadow: 0 16px 42px var(--shadow);
        display: none;
        z-index: 5;
      }

      .suggestions.open {
        display: block;
      }

      .suggestion {
        display: grid;
        grid-template-columns: 110px minmax(0, 1fr);
        gap: 10px;
        padding: 8px 10px;
        border-bottom: 1px solid rgba(57, 255, 95, 0.18);
        cursor: pointer;
      }

      .suggestion:last-child {
        border-bottom: 0;
      }

      .suggestion:hover,
      .suggestion.active {
        background: #202317;
        background: #081a08;
      }

      .suggestion-key {
        color: var(--green);
        white-space: nowrap;
      }

      .suggestion-desc {
        color: var(--muted);
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .queue {
        display: flex;
        gap: 8px;
        overflow: hidden;
      }

      .queue-item {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        min-width: 0;
        max-width: 220px;
        padding: 3px 8px;
        border: 1px solid var(--line);
        border-radius: 0;
        color: var(--muted);
        white-space: nowrap;
      }

      .dot {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: var(--green);
      }

      .dot.pulse {
        background: var(--amber);
        animation: pulse 1s infinite;
      }

      .saved {
        color: var(--green);
        opacity: 0;
        transition: opacity 160ms ease;
      }

      .saved.visible {
        opacity: 1;
      }

      .modal-backdrop {
        position: fixed;
        inset: 0;
        z-index: 30;
        display: none;
        align-items: center;
        justify-content: center;
        padding: 24px;
        background: rgba(0, 0, 0, 0.72);
      }

      .modal-backdrop.open {
        display: flex;
      }

      .modal {
        width: min(900px, 100%);
        height: min(680px, 100%);
        display: grid;
        grid-template-rows: auto auto minmax(0, 1fr) auto;
        border: 1px solid var(--line-strong);
        background: #020802;
        box-shadow: 0 24px 80px var(--shadow), inset 0 0 0 1px rgba(57, 255, 95, 0.18);
      }

      .modal-head {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 10px;
        align-items: center;
        min-height: 38px;
        padding: 0 12px;
        border-bottom: 1px solid var(--line);
      }

      .modal-title {
        color: var(--green);
        text-transform: uppercase;
      }

      .modal-body {
        display: grid;
        grid-template-columns: 220px minmax(0, 1fr);
        min-height: 0;
      }

      .settings-list {
        border-right: 1px solid var(--line);
        padding: 10px;
        overflow: auto;
      }

      .settings-main {
        display: grid;
        grid-template-rows: auto minmax(0, 1fr);
        min-height: 0;
        padding: 10px;
        gap: 10px;
      }

      @keyframes pulse {
        0%,
        100% {
          opacity: 0.35;
        }
        50% {
          opacity: 1;
        }
      }

      @media (max-width: 980px) {
        .app {
          grid-template-columns: minmax(0, 1fr);
          grid-template-rows: 152px 36px minmax(0, 1fr) 104px 288px;
          grid-template-areas:
            "nav"
            "top"
            "chat"
            "composer"
            "side";
        }

        .nav {
          border-right: 0;
          border-bottom: 1px solid var(--line);
        }

        .nav-scroll {
          display: grid;
          grid-template-columns: 1fr 1fr;
          gap: 10px;
          padding: 8px;
        }

        .nav-section {
          margin-bottom: 0;
        }

        .nav-foot {
          display: none;
        }

        .side {
          border-left: 0;
          border-top: 1px solid var(--line);
          grid-template-columns: 1fr 1fr;
          grid-template-rows: minmax(0, 1fr);
        }

        .side-block:first-child {
          border-right: 1px solid var(--line);
        }

        .editor {
          min-height: 0;
        }
      }

      @media (max-width: 640px) {
        .topbar {
          grid-template-columns: 1fr auto;
        }

        .topbar .pill:last-child {
          display: none;
        }

        .event {
          grid-template-columns: 12px minmax(0, 1fr);
          gap: 4px;
        }

        .event::before {
          grid-row: 1 / span 2;
        }

        .event .meta,
        .event .content {
          grid-column: 2;
        }

        .side {
          grid-template-columns: 1fr;
          grid-template-rows: 260px minmax(0, 1fr);
        }

        .modal-body {
          grid-template-columns: 1fr;
          grid-template-rows: auto minmax(0, 1fr);
        }

        .settings-list {
          border-right: 0;
          border-bottom: 1px solid var(--line);
          display: grid;
          grid-template-columns: repeat(3, 1fr);
          gap: 6px;
        }

        .side-block:first-child {
          border-right: 0;
        }

        .suggestions {
          left: 12px;
          right: 12px;
        }
      }
    </style>
  </head>
  <body>
    <main class="app">
      <nav class="nav" aria-label="Workspace and room navigation">
        <div class="nav-head">
          <div class="nav-title">GAIA</div>
          <div class="nav-subtitle">local rooms / workspace graph</div>
        </div>
        <div class="nav-scroll">
          <section class="nav-section">
            <div class="nav-label">
              <span>Workspaces</span>
              <span>2</span>
            </div>
            <button class="workspace-card active" type="button">
              <span>
                <span class="workspace-name">GAIA Playground</span>
                <span class="workspace-path">/Users/.../GAIA Playground</span>
              </span>
              <span>*</span>
            </button>
            <button class="workspace-card" type="button">
              <span>
                <span class="workspace-name">Nanoclaw</span>
                <span class="workspace-path">/tmp/nanoclaw</span>
              </span>
              <span></span>
            </button>
          </section>

          <section class="nav-section">
            <div class="nav-label">
              <span>Rooms</span>
              <span>3</span>
            </div>
            <button class="room-link active" type="button">
              <span>
                <span class="room-name">default</span>
                <span class="room-meta">@gaia active now</span>
              </span>
              <span>42</span>
            </button>
            <button class="room-link" type="button">
              <span>
                <span class="room-name">ui-refactor</span>
                <span class="room-meta">@sidia waiting</span>
              </span>
              <span>18</span>
            </button>
            <button class="room-link" type="button">
              <span>
                <span class="room-name">persona-lab</span>
                <span class="room-meta">archived</span>
              </span>
              <span>07</span>
            </button>
          </section>
        </div>
        <div class="nav-foot">
          <button id="globalSettingsButton" type="button">global settings</button>
          <button type="button">new room</button>
        </div>
      </nav>

      <header class="topbar">
          <div class="brand">
          <span class="prompt">GAIA://</span>

      function escapeHtml(value) {
        return value.replace(/[&<>"']/g, (char) => {
          return {
            "&": "&amp;",
            "<": "&lt;",
            ">": "&gt;",
            '"': "&quot;",
            "'": "&#039;",
          }[char];
        });
      }

      function renderMarkdownSettings(text) {
        const lines = text.split("\n");
        let html = "";
        let listOpen = false;
        let groupOpen = false;
        let paragraph = [];

        const flushParagraph = () => {
          if (paragraph.length === 0) return;
          const value = paragraph.join("\n");
          const multiline = paragraph.length > 1 || value.length > 68;
          html += multiline
            ? `<div class="md-line"><textarea>${escapeHtml(value)}</textarea></div>`
            : `<div class="md-line"><input value="${escapeHtml(value)}" /></div>`;
          paragraph = [];
        };

        const closeList = () => {
          if (!listOpen) return;
          html += `<button class="md-add-row" type="button">+ add item</button></div>`;
          listOpen = false;
        };

        for (const line of lines) {
          if (line.startsWith("# ")) {
            flushParagraph();
            closeList();
            if (groupOpen) html += "</div>";
            html += `<div class="setting-group"><div class="setting-heading">${escapeHtml(line.slice(2))}</div>`;
            groupOpen = true;
            continue;
          }

          if (line.startsWith("## ")) {
            flushParagraph();
            closeList();
            html += `<div class="setting-heading">${escapeHtml(line.slice(3))}</div>`;
            continue;
          }

          if (line.startsWith("### ")) {
            flushParagraph();
            closeList();
            html += `<div class="setting-heading">${escapeHtml(line.slice(4))}</div>`;
            continue;
          }

          if (line.startsWith("- ")) {
            flushParagraph();
            if (!listOpen) {
              html += `<div class="setting-list">`;
              listOpen = true;
            }
            html += `
              <div class="md-list-row">
                <span class="md-bullet">-</span>
                <input value="${escapeHtml(line.slice(2))}" />
                <button type="button">x</button>
              </div>
            `;
            continue;
          }

          if (!line.trim()) {
            flushParagraph();
            closeList();
            continue;
          }

          if (line.startsWith("---")) continue;
          closeList();
          paragraph.push(line);
        }

        flushParagraph();
        closeList();
        if (groupOpen) html += "</div>";
        if (!html.includes("setting-group")) html = `<div class="setting-group">${html}</div>`;
        if (!html.trim()) html = `<div class="setting-group"><div class="setting-heading">empty file</div></div>`;
        return html;
      }

      function renderJsonSettings(text) {
        try {
          const value = JSON.parse(text);
          return `<div class="rendered-json">${Object.entries(value)
            .map(([key, raw]) => {
              if (raw && typeof raw === "object" && !Array.isArray(raw)) {
                return `
                  <div class="setting-group">
                    <div class="setting-heading">${escapeHtml(key)}</div>
                    ${Object.entries(raw)
                      .map(
                        ([childKey, childValue]) => `
                          <div class="setting-field">
                            <label>${escapeHtml(childKey)}</label>
                            <input value="${escapeHtml(String(childValue))}" />
                          </div>
                        `,
                      )
                      .join("")}
                  </div>
                `;
              }

              return `
                <div class="setting-field">
                  <label>${escapeHtml(key)}</label>
                  <input value="${escapeHtml(String(raw))}" />
                </div>
              `;
            })
            .join("")}</div>`;
        } catch {
          return `<div class="setting-group"><div class="setting-heading">invalid json</div><p>Use raw mode to repair this file.</p></div>`;
        }
      }

      function renderFileAsSettings(file) {
        return file.type === "json" ? renderJsonSettings(file.text) : renderMarkdownSettings(file.text);
      }

      function syncEditorMode() {
        const file = workspaceFiles[activeFile];

        if (activeRoomTab === "tasks") {

      function renderTabs() {
        tabsEl.innerHTML = Object.entries(workspaceFiles)

      function renderEvent(event) {
        const agent = agents.find((item) => item.id === event.author);
        const authorClass =
          event.author === "user" ? "user" : agent ? agent.colorClass : "";
        const label = event.author === "user" ? "you" : `@${event.author}`;
        const tools = event.tools?.length
          ? `<div class="tool-row">${event.tools
              .map((tool) => `<span class="tool">${escapeHtml(tool)}</span>`)
              .join("")}</div>`
          : "";

        const node = document.createElement("article");
        node.className = "event";
        node.innerHTML = `
          <div class="meta">
            <div class="author ${authorClass}">${label}</div>
            <div>${event.time}</div>
          </div>
          <div class="content">${escapeHtml(event.text)}${tools}</div>
        `;
        chat.appendChild(node);
        chat.scrollTop = chat.scrollHeight;
        return node;
      }

      function nowTime() {
        return new Date().toLocaleTimeString([], {
          hour: "2-digit",
          minute: "2-digit",
        });
      }

      function setAgentState(id, state) {
        const agent = agents.find((item) => item.id === id);
        if (!agent) return;
        agent.state = state;
        renderRoomPanel();

      function addQueueItem(label) {
        taskId += 1;
        const id = `task-${taskId}`;
        const node = document.createElement("span");
        node.className = "queue-item";
        node.id = id;
        node.innerHTML = `<span class="dot pulse"></span><span>${escapeHtml(label)}</span>`;
        queue.appendChild(node);
        return () => {
          const item = document.getElementById(id);
          if (!item) return;
          item.querySelector(".dot").classList.remove("pulse");
          setTimeout(() => item.remove(), 900);
        };
      }

      function simulateAgentReply(targets, text) {
        let delay = 320;
        targets.forEach((target) => {
          setTimeout(() => {
            setAgentState(target, "running");
            runtimePill.textContent = `Pi SDK: @${target} streaming`;
            const finishQueue = addQueueItem(`@${target}`);
            const eventNode = renderEvent({
              author: target,
              time: nowTime(),
              text: "",
            });
            const content = eventNode.querySelector(".content");
            const response =
              target === "sidia"
                ? "The minimal version should prove the command and config model. Avoid adding navigation until transcript, composer, and prompt editing feel solid."
                : target === "terry"
                  ? "I would implement this as a Node local server with SSE for runtime events, then a small web client that renders controller snapshots."
                  : `Received: "${text}". I would route this through the same command registry that powers slash previews and future UI panels.`;
            let index = 0;
            const timer = setInterval(() => {
              content.textContent += response.slice(index, index + 4);
              index += 4;
              chat.scrollTop = chat.scrollHeight;
              if (index >= response.length) {
                clearInterval(timer);
                setAgentState(target, "idle");
                finishQueue();
                runtimePill.textContent = "Pi SDK: ready";
              }
            }, 28);
          }, delay);
          delay += 620;
        });
      }

      function targetAgents(text) {
        const mentioned = [...text.matchAll(/@([a-z0-9_-]+)/gi)]
          .map((match) => match[1].toLowerCase())
          .filter((id) => agents.some((agent) => agent.id === id));
        return mentioned.length ? [...new Set(mentioned)] : ["gaia"];
      }

      function showSuggestions() {
        const text = input.value;
        const slashMatch = text.match(/^\/([^\s]*)$/);
        const mentionMatch = text.match(/(^|\s)@([a-z0-9_-]*)$/i);

        if (slashMatch) {
          const query = slashMatch[1].toLowerCase();
          visibleSuggestions = commands.filter((command) =>
            command.label.slice(1).startsWith(query),
          );
        } else if (mentionMatch) {
          const query = mentionMatch[2].toLowerCase();
          visibleSuggestions = agents
            .filter((agent) => agent.id.startsWith(query))
            .map((agent) => ({
              label: `@${agent.id}`,
              desc: `${agent.name} / ${agent.role}`,
            }));
        } else {
          visibleSuggestions = [];
        }

        selectedSuggestion = Math.min(
          selectedSuggestion,
          Math.max(0, visibleSuggestions.length - 1),
        );

        suggestions.classList.toggle("open", visibleSuggestions.length > 0);
        suggestions.innerHTML = visibleSuggestions
          .map((item, index) => {
            const active = index === selectedSuggestion ? " active" : "";
            return `
              <div class="suggestion${active}" data-index="${index}">
                <span class="suggestion-key">${escapeHtml(item.label)}</span>
                <span class="suggestion-desc">${escapeHtml(item.desc)}</span>
              </div>
            `;
          })
          .join("");
      }

      function applySuggestion() {
        const item = visibleSuggestions[selectedSuggestion];
        if (!item) return false;

        if (item.label.startsWith("/")) {
          input.value = item.label + " ";
        } else {
          input.value = input.value.replace(/(^|\s)@([a-z0-9_-]*)$/i, `$1${item.label} `);
        }
        visibleSuggestions = [];
        suggestions.classList.remove("open");
        input.focus();
        return true;
      }

        syncGlobalEditorMode();
      });

      document.querySelector("#saveGlobal").addEventListener("click", () => {
        globalFiles[activeGlobalFile].text = globalEditor.value;
        syncGlobalEditorMode();
        globalSaved.classList.add("visible");
        setTimeout(() => globalSaved.classList.remove("visible"), 900);
      });

      document.querySelector("#resetGlobal").addEventListener("click", () => {
        loadGlobalFile();
      });

      composer.addEventListener("submit", (event) => {
        event.preventDefault();
        const text = input.value.trim();
        if (!text) return;

        if (text.startsWith("/")) {
          renderEvent({
            author: "user",
            time: nowTime(),
            text,
          });
          renderEvent({
            author: "gaia",
            time: nowTime(),
            text:
              text.startsWith("/roles")
                ? "gaia: planner\nsidia: critique\nterry: builder"
                : "Command handled from the shared command registry.",
          });
          input.value = "";
          showSuggestions();
          return;
        }

        renderEvent({
          author: "user",
          time: nowTime(),
          text,
        });
        const targets = targetAgents(text);
        input.value = "";
        showSuggestions();
        simulateAgentReply(targets, text);
      });

      input.addEventListener("input", () => {
        selectedSuggestion = 0;
        showSuggestions();
      });

      input.addEventListener("keydown", (event) => {
        if (!visibleSuggestions.length) return;

        if (event.key === "ArrowDown") {
          selectedSuggestion = (selectedSuggestion + 1) % visibleSuggestions.length;
          showSuggestions();
          event.preventDefault();
        }

        if (event.key === "ArrowUp") {
          selectedSuggestion =
            (selectedSuggestion - 1 + visibleSuggestions.length) %
            visibleSuggestions.length;
          showSuggestions();
          event.preventDefault();
        }

        if (event.key === "Tab" || event.key === "Enter") {
          if (applySuggestion()) event.preventDefault();
        }

        if (event.key === "Escape") {
          visibleSuggestions = [];
          suggestions.classList.remove("open");
          event.preventDefault();
        }
      });

      suggestions.addEventListener("mousedown", (event) => {
        const item = event.target.closest("[data-index]");
        if (!item) return;
        selectedSuggestion = Number(item.dataset.index);
        applySuggestion();
        event.preventDefault();
      });

      initialEvents.forEach(renderEvent);
      renderRoomPanel();
      renderTabs();
      renderGlobalTabs();
      loadEditorFile();
      loadGlobalFile();
      input.focus();
    </script>
  </body>
</html>
